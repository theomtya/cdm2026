<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CDM 2026 — Live</title>
<style>
:root{
  --dark:#0a0705;--card:#141010;--card2:#1c1612;
  --red:#e63946;--red-dark:#9b1d23;--orange:#f4831f;--cream:#f1e8d8;
  --green:#34c759;--gold:#ffd700;
  --muted:#8a6050;--muted2:#5a3a28;--muted3:#3a2820;
  --ease:cubic-bezier(0.23,1,0.32,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{background:var(--dark);color:var(--cream);font-family:Georgia,'SF Pro Display',serif;overflow-x:hidden;min-height:100dvh;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");opacity:.022;pointer-events:none;z-index:200;}
.scrollline{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--orange),var(--red));z-index:1000;width:0%;transition:width .05s linear;}

/* NAV */
nav{position:sticky;top:0;z-index:500;background:rgba(10,7,5,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.05);padding:12px 16px;}
.nav-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.nav-logo{font-size:14px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--red);}
.nav-status{font-size:10px;color:var(--muted);display:flex;align-items:center;gap:5px;}
.nav-status .dot{width:6px;height:6px;border-radius:50%;background:var(--green);}
.nav-status.loading .dot{background:var(--orange);animation:blink 1s infinite;}
.nav-status.err .dot{background:var(--red);}
.tabs{display:flex;gap:6px;}
.tab{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:var(--muted);font-family:inherit;font-size:12px;letter-spacing:1px;text-transform:uppercase;padding:9px 8px;border-radius:10px;cursor:pointer;transition:all .2s var(--ease);}
.tab.active{background:var(--red);border-color:var(--red);color:#fff;font-weight:700;}
.filters{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-top:10px;}
.filters::-webkit-scrollbar{display:none;}
.filter{flex-shrink:0;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:var(--muted);font-family:inherit;font-size:12px;letter-spacing:1px;padding:7px 13px;border-radius:20px;cursor:pointer;transition:all .2s;white-space:nowrap;}
.filter.active{background:var(--orange);border-color:var(--orange);color:#1a0f08;font-weight:700;}

/* HERO */
#hero{padding:34px 20px 28px;background:radial-gradient(ellipse at 50% 0%,#2a0808 0%,#0a0705 65%);text-align:center;}
.hero-eyebrow{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--red);margin-bottom:12px;display:block;opacity:0;animation:fadeUp .6s var(--ease) .2s forwards;}
h1{font-size:clamp(40px,12vw,76px);font-weight:900;text-transform:uppercase;letter-spacing:-2px;line-height:.92;margin-bottom:8px;opacity:0;animation:fadeUp .8s var(--ease) .35s forwards;}
h1 span{color:var(--red);}
.hero-sub{font-size:12px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:22px;font-style:italic;opacity:0;animation:fadeUp .8s var(--ease) .5s forwards;}
.next-banner{background:rgba(230,57,70,.08);border:1px solid rgba(230,57,70,.22);border-radius:16px;padding:16px;max-width:460px;margin:0 auto;opacity:0;animation:fadeUp .8s var(--ease) .6s forwards;}
.next-label{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--red);margin-bottom:10px;}
.next-teams{display:flex;align-items:center;justify-content:center;gap:10px;font-size:15px;font-weight:700;margin-bottom:12px;text-transform:uppercase;letter-spacing:-.3px;}
.next-teams img{width:26px;height:auto;border-radius:3px;vertical-align:middle;}
.countdown{display:flex;justify-content:center;align-items:baseline;gap:5px;}
.cdb{text-align:center;min-width:42px;}
.cdn{font-size:26px;font-weight:900;color:var(--orange);line-height:1;font-variant-numeric:tabular-nums;}
.cdu{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:3px;}
.cds{font-size:18px;color:var(--muted2);}

/* VIEW CONTAINERS */
.view{padding:6px 0 50px;min-height:50vh;}
.view[hidden]{display:none;}
.empty{text-align:center;padding:50px 20px;color:var(--muted);font-style:italic;font-size:13px;}

/* DATE SEP */
.date-sep{padding:22px 16px 8px;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:12px;}
.date-sep-line{flex:1;height:1px;background:rgba(255,255,255,.06);}

/* MATCH CARD */
.mcard{margin:0 12px 8px;background:var(--card);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:13px 15px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:transform .15s var(--ease),border-color .2s,background .2s;}
.mcard:active{transform:scale(.975);background:var(--card2);}
.mcard.live{border-color:var(--red);background:rgba(230,57,70,.07);}
.mcard.played{opacity:.78;}
.mc-left{display:flex;flex-direction:column;align-items:center;min-width:50px;background:rgba(255,255,255,.04);border-radius:10px;padding:7px 5px;flex-shrink:0;}
.mc-hour{font-size:14px;font-weight:800;color:var(--cream);line-height:1;font-variant-numeric:tabular-nums;}
.mc-day{font-size:9px;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin-top:3px;}
.mc-center{flex:1;min-width:0;display:flex;flex-direction:column;gap:6px;}
.mc-row{display:flex;align-items:center;gap:8px;}
.mc-row img{width:22px;height:auto;border-radius:3px;flex-shrink:0;}
.mc-flag-ph{width:22px;height:15px;border-radius:3px;background:rgba(255,255,255,.08);flex-shrink:0;display:inline-block;}
.mc-name{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:-.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.mc-gs{font-size:16px;font-weight:900;color:var(--orange);font-variant-numeric:tabular-nums;min-width:20px;text-align:right;}
.mc-meta{display:flex;align-items:center;gap:6px;margin-top:1px;flex-wrap:wrap;}
.badge{font-size:8px;letter-spacing:1px;text-transform:uppercase;padding:3px 7px;border-radius:5px;}
.b-grp{background:rgba(230,57,70,.15);color:var(--red);}
.b-ko{background:rgba(244,131,31,.15);color:var(--orange);}
.b-live{background:var(--red);color:#fff;display:flex;align-items:center;gap:4px;}
.b-live .dot{width:5px;height:5px;border-radius:50%;background:#fff;animation:blink 1.1s infinite;}
.b-ft{background:rgba(255,255,255,.06);color:var(--muted);}
.mc-cd{font-size:9px;font-weight:700;color:var(--orange);background:rgba(244,131,31,.1);border:1px solid rgba(244,131,31,.2);border-radius:5px;padding:2px 6px;font-variant-numeric:tabular-nums;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes fadeUp{to{opacity:1;transform:translateY(0);}}

/* STANDINGS */
.grp{margin:0 12px 14px;background:var(--card);border:1px solid rgba(255,255,255,.06);border-radius:16px;overflow:hidden;}
.grp.mine{border-color:rgba(244,131,31,.35);}
.grp-h{padding:12px 14px;font-size:12px;letter-spacing:2px;text-transform:uppercase;font-weight:700;color:var(--cream);border-bottom:1px solid rgba(255,255,255,.05);display:flex;justify-content:space-between;align-items:center;}
.grp-h .gl{font-size:9px;letter-spacing:1px;color:var(--muted);font-weight:400;}
.st-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px;}
.st-row:last-child{border-bottom:none;}
.st-pos{width:18px;font-weight:800;text-align:center;flex-shrink:0;font-variant-numeric:tabular-nums;color:var(--muted);}
.st-row.q1 .st-pos,.st-row.q2 .st-pos{color:var(--green);}
.st-row.q3 .st-pos{color:var(--orange);}
.st-row img{width:24px;height:auto;border-radius:3px;flex-shrink:0;}
.st-name{flex:1;font-weight:700;text-transform:uppercase;letter-spacing:-.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:12px;}
.st-name.me{color:var(--orange);}
.st-stats{display:flex;gap:9px;font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums;}
.st-stats .gd{min-width:24px;text-align:right;}
.st-pts{font-size:16px;font-weight:900;color:var(--orange);min-width:22px;text-align:right;font-variant-numeric:tabular-nums;}
.st-head{padding:6px 14px;font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--muted2);display:flex;gap:9px;justify-content:flex-end;}
.st-head span{min-width:18px;text-align:right;}
.legend{margin:0 12px 8px;font-size:9px;color:var(--muted);display:flex;gap:14px;flex-wrap:wrap;padding:0 4px;}
.legend i{font-style:normal;}
.legend .d{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px;vertical-align:middle;}

/* BRACKET */
.ko-round{margin:0 12px 18px;}
.ko-title{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--red);font-weight:700;margin:18px 4px 10px;display:flex;align-items:center;gap:10px;}
.ko-title::after{content:'';flex:1;height:1px;background:rgba(230,57,70,.2);}
.ko-card{background:var(--card);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:11px 14px;margin-bottom:8px;}
.ko-card.live{border-color:var(--red);}
.ko-side{display:flex;align-items:center;gap:9px;padding:5px 0;}
.ko-side img{width:22px;height:auto;border-radius:3px;flex-shrink:0;}
.ko-side .mc-flag-ph{width:22px;height:15px;}
.ko-nm{flex:1;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:-.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ko-nm.tbd{color:var(--muted);font-style:italic;font-weight:400;text-transform:none;letter-spacing:0;}
.ko-sc{font-size:15px;font-weight:900;color:var(--orange);font-variant-numeric:tabular-nums;}
.ko-mid{height:1px;background:rgba(255,255,255,.05);margin:2px 0;}
.ko-foot{font-size:9px;color:var(--muted);margin-top:7px;letter-spacing:.5px;display:flex;justify-content:space-between;}

/* BRACKET ARBORESCENT */
.bk-hint{text-align:center;font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin:10px 0 4px;}
.bracket{display:flex;overflow-x:auto;padding:6px 12px 18px;gap:18px;scrollbar-width:thin;align-items:stretch;}
.bracket::-webkit-scrollbar{height:6px;}
.bracket::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:3px;}
.bk-col{display:flex;flex-direction:column;min-width:152px;flex-shrink:0;}
.bk-col-t{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--red);text-align:center;margin-bottom:8px;font-weight:700;}
.bk-col-in{display:flex;flex-direction:column;justify-content:space-around;flex:1;gap:8px;}
.bk-card{position:relative;background:var(--card);border:1px solid rgba(255,255,255,.07);border-radius:9px;padding:6px 8px;cursor:pointer;transition:border-color .2s;}
.bk-card:active{border-color:var(--orange);}
.bk-card.live{border-color:var(--red);background:rgba(230,57,70,.06);}
.bk-col:not(:last-child) .bk-card::after{content:'';position:absolute;right:-18px;top:50%;width:18px;height:1px;background:rgba(255,255,255,.13);}
.bk-side{display:flex;align-items:center;gap:6px;padding:3px 0;font-size:11px;}
.bk-side.win{font-weight:800;color:var(--cream);}
.bk-side.win b{color:var(--green);}
.bk-side b{margin-left:auto;color:var(--orange);font-variant-numeric:tabular-nums;}
.bk-nm{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-transform:uppercase;letter-spacing:-.2px;}
.bk-nm.tbd{color:var(--muted);font-style:italic;text-transform:none;letter-spacing:0;font-size:10px;}
.bk-mini{width:16px;height:auto;border-radius:2px;flex-shrink:0;}
.bk-mini-ph{width:16px;height:11px;border-radius:2px;background:rgba(255,255,255,.08);flex-shrink:0;display:inline-block;}
.bk-third{margin:0 12px;max-width:240px;}

/* MODAL */
.ov{position:fixed;inset:0;z-index:900;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;}
.ov.open{opacity:1;pointer-events:all;}
.ov-bg{position:absolute;inset:0;background:rgba(5,3,2,.82);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);}
.modal{position:relative;z-index:1;background:#161210;border:1px solid rgba(255,255,255,.08);border-radius:24px 24px 0 0;width:100%;max-width:560px;max-height:86dvh;overflow-y:auto;transform:translateY(100%);transition:transform .35s var(--ease);scrollbar-width:none;padding-bottom:env(safe-area-inset-bottom,24px);}
.ov.open .modal{transform:translateY(0);}
.modal::-webkit-scrollbar{display:none;}
.m-handle{display:flex;justify-content:center;padding:11px 0 4px;position:sticky;top:0;background:#161210;}
.m-handle div{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,.13);}
.m-head{padding:6px 20px 16px;text-align:center;border-bottom:1px solid rgba(255,255,255,.05);}
.m-comp{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--red);margin-bottom:12px;}
.m-score{display:flex;align-items:center;justify-content:center;gap:16px;}
.m-team{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;max-width:130px;}
.m-team img{width:54px;height:auto;border-radius:4px;}
.m-team .nm{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:-.3px;}
.m-num{font-size:44px;font-weight:900;color:var(--orange);line-height:1;font-variant-numeric:tabular-nums;}
.m-vs{font-size:13px;color:var(--muted);}
.m-when{font-size:11px;color:var(--muted);margin-top:12px;font-style:italic;}
.m-body{padding:16px;}
.m-sec-t{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--red);margin-bottom:10px;}
.scorers{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.sc-col{display:flex;flex-direction:column;gap:6px;}
.sc-col.away{text-align:right;}
.sc-item{font-size:12px;color:var(--cream);}
.sc-item .min{color:var(--orange);font-weight:700;font-variant-numeric:tabular-nums;}
.sc-none{font-size:11px;color:var(--muted2);font-style:italic;}
.m-info{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;}
.m-ib{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);border-radius:10px;padding:10px 12px;}
.m-ib .l{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--red);margin-bottom:3px;}
.m-ib .v{font-size:13px;font-weight:600;}
</style>
</head>
<body>
<div class="scrollline" id="scrollLine"></div>

<nav>
  <div class="nav-top">
    <div class="nav-logo">⚽ CDM 2026</div>
    <div class="nav-status loading" id="status"><span class="dot"></span><span id="statusTxt">Chargement…</span></div>
  </div>
  <div class="tabs">
    <button class="tab active" data-tab="matchs">Matchs</button>
    <button class="tab" data-tab="classement">Classements</button>
    <button class="tab" data-tab="elim">Élimination</button>
  </div>
  <div class="filters" id="filters">
    <button class="filter active" data-f="mine">⭐ Mes équipes</button>
    <button class="filter" data-f="live">🔴 Live</button>
    <button class="filter" data-f="upcoming">À venir</button>
    <button class="filter" data-f="played">Terminés</button>
    <button class="filter" data-f="all">Tous</button>
    <button class="filter" data-f="33">🇫🇷 France</button>
    <button class="filter" data-f="41">🇵🇹 Portugal</button>
    <button class="filter" data-f="9">🇧🇷 Brésil</button>
    <button class="filter" data-f="29">🇪🇸 Espagne</button>
  </div>
</nav>

<section id="hero">
  <span class="hero-eyebrow">🏆 USA · Canada · Mexique</span>
  <h1>CDM <span>2026</span></h1>
  <p class="hero-sub">France · Portugal · Brésil · Espagne</p>
  <div class="next-banner" id="nextBanner" style="display:none;">
    <div class="next-label">⚡ Prochain match de tes équipes</div>
    <div class="next-teams" id="nextTeams">—</div>
    <div class="countdown">
      <div class="cdb"><div class="cdn" id="cdJ">00</div><div class="cdu">j</div></div>
      <div class="cds">:</div>
      <div class="cdb"><div class="cdn" id="cdH">00</div><div class="cdu">h</div></div>
      <div class="cds">:</div>
      <div class="cdb"><div class="cdn" id="cdM">00</div><div class="cdu">min</div></div>
      <div class="cds">:</div>
      <div class="cdb"><div class="cdn" id="cdS">00</div><div class="cdu">sec</div></div>
    </div>
  </div>
</section>

<div class="view" id="view-matchs"></div>
<div class="view" id="view-classement" hidden></div>
<div class="view" id="view-elim" hidden></div>

<div class="ov" id="ov">
  <div class="ov-bg" id="ovBg"></div>
  <div class="modal" id="modal"></div>
</div>

<script>
const API = 'https://worldcup26.ir/get';
const MY = ['33','9','29','41']; // France, Brésil, Espagne, Portugal
const EASTERN_OFFSET = 4; // heure stade US Est -> UTC (approx, été)

// Noms FR + ordre des phases
const FR = {
 'Mexico':'Mexique','South Africa':'Afrique du Sud','South Korea':'Corée du Sud','Czech Republic':'Tchéquie',
 'Canada':'Canada','Bosnia and Herzegovina':'Bosnie-Herz.','Qatar':'Qatar','Switzerland':'Suisse',
 'Brazil':'Brésil','Morocco':'Maroc','Haiti':'Haïti','Scotland':'Écosse','United States':'États-Unis',
 'Paraguay':'Paraguay','Australia':'Australie','Turkey':'Turquie','Germany':'Allemagne','Curaçao':'Curaçao',
 'Ivory Coast':'Côte d\'Ivoire','Ecuador':'Équateur','Netherlands':'Pays-Bas','Japan':'Japon','Sweden':'Suède',
 'Tunisia':'Tunisie','Belgium':'Belgique','Egypt':'Égypte','Iran':'Iran','New Zealand':'Nouvelle-Zélande',
 'Spain':'Espagne','Cape Verde':'Cap-Vert','Saudi Arabia':'Arabie Saoudite','Uruguay':'Uruguay','France':'France',
 'Senegal':'Sénégal','Iraq':'Irak','Norway':'Norvège','Argentina':'Argentine','Algeria':'Algérie','Austria':'Autriche',
 'Jordan':'Jordanie','Portugal':'Portugal','Democratic Republic of the Congo':'RD Congo','Uzbekistan':'Ouzbékistan',
 'Colombia':'Colombie','England':'Angleterre','Croatia':'Croatie','Ghana':'Ghana','Panama':'Panama'
};
const KO_ORDER = ['R32','R16','QF','SF','3RD','FINAL'];
const KO_LABEL = {R32:'16es de finale',R16:'8es de finale',QF:'Quarts de finale',SF:'Demi-finales','3RD':'Petite finale (3e place)',FINAL:'🏆 Finale'};

let TEAMS = {};     // id -> {name, flag, code, group}
let GAMES = [];     // matchs normalisés
let GROUPS = [];    // classements bruts
let curTab = 'matchs', curFilter = 'mine';

const $ = id => document.getElementById(id);
const frName = en => FR[en] || en || '?';

function trLabel(l){
  if(!l) return 'À déterminer';
  return l.replace('Winner Group','Vainqueur Groupe').replace('Runner-up Group','2e Groupe')
          .replace('Winner Match','Vainqueur M.').replace('Loser Match','Perdant M.')
          .replace(/3rd Group/,'3e Groupe').replace('Winner','Vainqueur').replace('Runner-up','2e');
}

function parseScorers(s){
  if(!s || s==='null' || s==='{}' ) return [];
  let inner = String(s).replace(/^\{/,'').replace(/\}$/,'');
  const parts = inner.split(/","|”,”|","|,(?=["“])/);
  return inner.split(',').map(x=>x.replace(/[{}"“”]/g,'').trim()).filter(Boolean);
}

function parseDate(ld){
  // "MM/DD/YYYY HH:MM" (heure locale stade, approx US Est)
  try{
    const [d,t] = ld.split(' ');
    const [mm,dd,yy] = d.split('/').map(Number);
    const [HH,MM] = t.split(':').map(Number);
    return {ts:Date.UTC(yy,mm-1,dd,HH+EASTERN_OFFSET,MM), localHour:t, dd,mm,yy};
  }catch(e){ return {ts:0,localHour:'',dd:0,mm:0,yy:0}; }
}

function statusOf(g){
  if(String(g.finished).toUpperCase()==='TRUE') return 'played';
  const te = String(g.time_elapsed||'').toLowerCase();
  if(te && te!=='notstarted' && te!=='finished') return 'live';
  return 'upcoming';
}

function normalize(g){
  const d = parseDate(g.local_date);
  const homeId = g.home_team_id, awayId = g.away_team_id;
  return {
    id:g.id,
    homeId, awayId,
    homeName: (homeId!=='0' && TEAMS[homeId]) ? TEAMS[homeId].name : trLabel(g.home_team_label || (g.home_team_name_en?frName(g.home_team_name_en):null)),
    awayName: (awayId!=='0' && TEAMS[awayId]) ? TEAMS[awayId].name : trLabel(g.away_team_label || (g.away_team_name_en?frName(g.away_team_name_en):null)),
    homeFlag: (homeId!=='0' && TEAMS[homeId]) ? TEAMS[homeId].flag : null,
    awayFlag: (awayId!=='0' && TEAMS[awayId]) ? TEAMS[awayId].flag : null,
    hs:g.home_score, as:g.away_score,
    homeScorers:parseScorers(g.home_scorers), awayScorers:parseScorers(g.away_scorers),
    group:g.group, matchday:g.matchday, type:(g.type||'group').toUpperCase(),
    isKo: (g.type||'group')!=='group',
    homeLabel:g.home_team_label||'', awayLabel:g.away_team_label||'',
    status:statusOf(g),
    ts:d.ts, localHour:d.localHour, dd:d.dd, mm:d.mm, yy:d.yy
  };
}

async function load(){
  setStatus('loading','Chargement…');
  try{
    const [tR,gR,grR] = await Promise.all([
      fetch(API+'/teams'), fetch(API+'/games'), fetch(API+'/groups')
    ]);
    const t = await tR.json(), g = await gR.json(), gr = await grR.json();
    TEAMS = {};
    (t.teams||[]).forEach(x=>{ TEAMS[x.id]={name:frName(x.name_en),flag:x.flag,code:x.fifa_code,group:x.groups}; });
    GAMES = (g.games||[]).map(normalize);
    GROUPS = gr.groups||[];
    setStatus('ok','À jour · '+new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}));
    renderAll();
  }catch(e){
    setStatus('err','Connexion impossible');
    $('view-matchs').innerHTML = '<div class="empty">Impossible de joindre l\'API en ce moment.<br>Réessaie dans quelques minutes — le service est peut-être momentanément indisponible.</div>';
  }
}
function setStatus(cls,txt){ const s=$('status'); s.className='nav-status '+cls; $('statusTxt').textContent=txt; }

const MONTHS=['janv.','févr.','mars','avr.','mai','juin','juil.','août','sept.','oct.','nov.','déc.'];
const DAYS=['dim.','lun.','mar.','mer.','jeu.','ven.','sam.'];
function dateKey(m){ return m.dd+'/'+m.mm+'/'+m.yy; }
function dateLabel(m){ const dt=new Date(m.ts); return DAYS[dt.getUTCDay()]+' '+m.dd+' '+MONTHS[m.mm-1]; }

function flagImg(url,cls){ return url?`<img src="${url}" alt="" loading="lazy">`:`<span class="mc-flag-ph"></span>`; }

function cardCountdown(ts){
  const diff = ts - Date.now(); if(diff<=0) return null;
  const j=Math.floor(diff/864e5), h=Math.floor(diff%864e5/36e5), mn=Math.floor(diff%36e5/6e4);
  if(j>0) return 'J-'+j;
  if(h>0) return h+'h'+String(mn).padStart(2,'0');
  return mn+'min';
}

function renderAll(){ renderHero(); renderMatchs(); renderStandings(); renderElim(); }

/* ---------- HERO countdown ---------- */
let cdTimer=null;
function renderHero(){
  const up = GAMES.filter(m=>m.status==='upcoming' && (MY.includes(m.homeId)||MY.includes(m.awayId)) && m.ts>Date.now())
                  .sort((a,b)=>a.ts-b.ts);
  const nb=$('nextBanner');
  if(!up.length){ nb.style.display='none'; return; }
  const m=up[0]; nb.style.display='block';
  $('nextTeams').innerHTML = `${flagImg(m.homeFlag)} ${m.homeName} <span style="color:var(--muted)">vs</span> ${m.awayName} ${flagImg(m.awayFlag)}`;
  if(cdTimer) clearInterval(cdTimer);
  const tick=()=>{ let d=m.ts-Date.now(); if(d<0)d=0; const p=n=>String(n).padStart(2,'0');
    $('cdJ').textContent=p(Math.floor(d/864e5)); $('cdH').textContent=p(Math.floor(d%864e5/36e5));
    $('cdM').textContent=p(Math.floor(d%36e5/6e4)); $('cdS').textContent=p(Math.floor(d%6e4/1e3)); };
  tick(); cdTimer=setInterval(tick,1000);
}

/* ---------- MATCHS ---------- */
function matchFilter(m){
  switch(curFilter){
    case 'mine': return MY.includes(m.homeId)||MY.includes(m.awayId);
    case 'live': return m.status==='live';
    case 'upcoming': return m.status==='upcoming';
    case 'played': return m.status==='played';
    case 'all': return true;
    default: return m.homeId===curFilter||m.awayId===curFilter; // par équipe
  }
}
function matchCardHTML(m){
  const live=m.status==='live', played=m.status==='played';
  let right;
  if(played||live) right=`<span class="mc-gs">${m.hs}</span>`;
  else right='';
  const gsHome = (played||live)?`<span class="mc-gs">${m.hs}</span>`:'';
  const gsAway = (played||live)?`<span class="mc-gs">${m.as}</span>`:'';
  let badge = m.isKo?`<span class="badge b-ko">${KO_LABEL[m.type]?KO_LABEL[m.type].replace('🏆 ',''):m.group}</span>`
                    :`<span class="badge b-grp">Groupe ${m.group}</span>`;
  let stat = live?`<span class="badge b-live"><span class="dot"></span>Live</span>`
            : played?`<span class="badge b-ft">Terminé</span>`:'';
  const cd = (m.status==='upcoming')?cardCountdown(m.ts):null;
  return `<div class="mcard ${live?'live':''} ${played?'played':''}" data-id="${m.id}">
    <div class="mc-left">
      <div class="mc-hour">${(played||live)?'FT':m.localHour||'--'}</div>
      <div class="mc-day">${m.dd?(m.dd+'/'+m.mm):''}</div>
    </div>
    <div class="mc-center">
      <div class="mc-row">${flagImg(m.homeFlag)}<span class="mc-name">${m.homeName}</span>${gsHome}</div>
      <div class="mc-row">${flagImg(m.awayFlag)}<span class="mc-name">${m.awayName}</span>${gsAway}</div>
      <div class="mc-meta">${badge}${stat}${cd?`<span class="mc-cd">⏱ ${cd}</span>`:''}</div>
    </div>
  </div>`;
}
function sectionHTML(title, arr){
  if(!arr.length) return '';
  let h=`<div class="date-sep"><div class="date-sep-line"></div><span>${title}</span><div class="date-sep-line"></div></div>`;
  arr.forEach(m=>h+=matchCardHTML(m));
  return h;
}
function renderMatchs(){
  const list = GAMES.filter(matchFilter);
  const box=$('view-matchs');
  if(!list.length){ box.innerHTML='<div class="empty">Aucun match pour ce filtre.</div>'; return; }
  const splitMode = (curFilter==='mine' || /^\d+$/.test(curFilter));
  if(splitMode){
    const live=list.filter(m=>m.status==='live').sort((a,b)=>a.ts-b.ts);
    const up  =list.filter(m=>m.status==='upcoming').sort((a,b)=>a.ts-b.ts);
    const pl  =list.filter(m=>m.status==='played').sort((a,b)=>b.ts-a.ts);
    box.innerHTML = sectionHTML('🔴 En cours',live)+sectionHTML('⚡ À venir',up)+sectionHTML('✓ Terminés',pl);
  } else {
    const sorted=[...list].sort((a,b)=>a.ts-b.ts);
    let html='', lastKey=null;
    sorted.forEach(m=>{
      const key=m.isKo?('ko-'+m.type):dateKey(m);
      if(key!==lastKey){
        lastKey=key;
        const lab=m.isKo?(KO_LABEL[m.type]||m.group):dateLabel(m);
        html+=`<div class="date-sep"><div class="date-sep-line"></div><span>${lab}</span><div class="date-sep-line"></div></div>`;
      }
      html+=matchCardHTML(m);
    });
    box.innerHTML=html;
  }
  box.querySelectorAll('.mcard').forEach(c=>c.addEventListener('click',()=>openModal(c.dataset.id)));
}

/* ---------- CLASSEMENTS ---------- */
function renderStandings(){
  const box=$('view-classement');
  if(!GROUPS.length){ box.innerHTML='<div class="empty">Classements indisponibles.</div>'; return; }
  let html=`<div class="legend"><span><i class="d" style="background:var(--green)"></i>Qualifié (1er–2e)</span><span><i class="d" style="background:var(--orange)"></i>3e (repêchable)</span></div>`;
  // groupes de mes équipes d'abord
  const myGroups = new Set(MY.map(id=>TEAMS[id]&&TEAMS[id].group).filter(Boolean));
  const ordered=[...GROUPS].sort((a,b)=>{
    const am=myGroups.has(a.name)?0:1, bm=myGroups.has(b.name)?0:1;
    return am-bm || a.name.localeCompare(b.name);
  });
  ordered.forEach(g=>{
    const mine=myGroups.has(g.name);
    const rows=[...g.teams].sort((a,b)=> (+b.pts)-(+a.pts) || (+b.gd)-(+a.gd) || (+b.gf)-(+a.gf));
    html+=`<div class="grp ${mine?'mine':''}"><div class="grp-h">Groupe ${g.name}${mine?' <span class="gl">⭐ une de tes équipes</span>':''}</div>
      <div class="st-head"><span>J</span><span>DB</span><span>Pts</span></div>`;
    rows.forEach((t,i)=>{
      const tm=TEAMS[t.team_id]||{name:'?',flag:null};
      const isMe=MY.includes(t.team_id);
      const qcls=i<2?'q'+(i+1):(i===2?'q3':'');
      html+=`<div class="st-row ${qcls}">
        <span class="st-pos">${i+1}</span>${flagImg(tm.flag)}
        <span class="st-name ${isMe?'me':''}">${tm.name}</span>
        <span class="st-stats"><span>${t.mp}</span><span class="gd">${(+t.gd>0?'+':'')+t.gd}</span></span>
        <span class="st-pts">${t.pts}</span></div>`;
    });
    html+=`</div>`;
  });
  box.innerHTML=html;
}

/* ---------- ELIMINATION ---------- */
function renderElim(){
  const box=$('view-elim');
  const ko=GAMES.filter(m=>m.isKo);
  if(!ko.length){ box.innerHTML='<div class="empty">La phase à élimination directe s\'affichera dès que le calendrier des 16es sera publié.</div>'; return; }
  const byId={}; ko.forEach(m=>byId[m.id]=m);
  // Reconstruire l'arbre depuis les labels "Match X"
  const childMap={};
  ko.forEach(m=>{
    const ids=[];
    [m.homeLabel,m.awayLabel].forEach(l=>{ const mm=l&&l.match(/Match (\d+)/i); if(mm&&byId[mm[1]]) ids.push(mm[1]); });
    childMap[m.id]=ids;
  });
  const slot={}; let leaf=0;
  function assign(id){
    const ch=childMap[id]||[];
    if(!ch.length){ if(slot[id]===undefined) slot[id]=leaf++; return slot[id]; }
    const ps=ch.map(assign); slot[id]=ps.reduce((a,b)=>a+b,0)/ps.length; return slot[id];
  }
  if(byId['104']) assign('104');
  ko.forEach(m=>{ if(slot[m.id]===undefined) slot[m.id]=leaf++; });

  const rounds=['R32','R16','QF','SF','FINAL'];
  let cols='';
  rounds.forEach(r=>{
    const games=ko.filter(m=>m.type===r).sort((a,b)=>slot[a.id]-slot[b.id]);
    if(!games.length) return;
    cols+=`<div class="bk-col"><div class="bk-col-t">${(KO_LABEL[r]||r).replace('🏆 ','')}</div><div class="bk-col-in">${games.map(bkCard).join('')}</div></div>`;
  });
  const third=ko.find(m=>m.type==='3RD');
  const thirdHTML = third?`<div class="ko-title">🥉 Petite finale</div><div class="bk-third">${bkCard(third)}</div>`:'';
  box.innerHTML=`<div class="bk-hint">← fais glisser pour parcourir le tableau →</div><div class="bracket">${cols}</div>${thirdHTML}`;
  box.querySelectorAll('[data-id]').forEach(c=>c.addEventListener('click',()=>openModal(c.dataset.id)));
}
function miniFlag(url){ return url?`<img class="bk-mini" src="${url}" alt="" loading="lazy">`:`<span class="bk-mini-ph"></span>`; }
function bkCard(m){
  const sc=(m.status==='played'||m.status==='live');
  const wh=sc&&(+m.hs>+m.as), wa=sc&&(+m.as>+m.hs);
  return `<div class="bk-card ${m.status==='live'?'live':''}" data-id="${m.id}">
    <div class="bk-side ${wh?'win':''}">${miniFlag(m.homeFlag)}<span class="bk-nm ${m.homeId==='0'?'tbd':''}">${m.homeName}</span>${sc?`<b>${m.hs}</b>`:''}</div>
    <div class="bk-side ${wa?'win':''}">${miniFlag(m.awayFlag)}<span class="bk-nm ${m.awayId==='0'?'tbd':''}">${m.awayName}</span>${sc?`<b>${m.as}</b>`:''}</div>
  </div>`;
}

/* ---------- MODAL ---------- */
function openModal(id){
  const m=GAMES.find(x=>x.id===id); if(!m) return;
  const sc=(m.status==='played'||m.status==='live');
  const comp=m.isKo?(KO_LABEL[m.type]||m.group):('Groupe '+m.group+' · Journée '+m.matchday);
  const scList=(arr,cls)=> arr.length?arr.map(s=>{
      const mm=s.match(/(\d+\+?\d*'?)\s*$/); const min=mm?mm[1]:''; const nm=min?s.replace(min,'').trim():s;
      return `<div class="sc-item">${cls==='away'?`<span class="min">${min}</span> ${nm}`:`${nm} <span class="min">${min}</span>`}</div>`;
    }).join(''):'<div class="sc-none">—</div>';
  let body='';
  if(sc){
    body=`<div class="m-sec-t">⚽ Buteurs</div>
      <div class="scorers"><div class="sc-col home">${scList(m.homeScorers,'home')}</div>
      <div class="sc-col away">${scList(m.awayScorers,'away')}</div></div>`;
  }
  $('modal').innerHTML=`
    <div class="m-handle"><div></div></div>
    <div class="m-head">
      <div class="m-comp">${m.isKo?'🏆 CDM 2026 — '+comp:'🏆 CDM 2026 — '+comp}</div>
      <div class="m-score">
        <div class="m-team">${flagImg(m.homeFlag)}<span class="nm">${m.homeName}</span></div>
        ${sc?`<span class="m-num">${m.hs}</span><span class="m-vs">—</span><span class="m-num">${m.as}</span>`:`<span class="m-vs">vs</span>`}
        <div class="m-team">${flagImg(m.awayFlag)}<span class="nm">${m.awayName}</span></div>
      </div>
      <div class="m-when">${m.dd?(dateLabel(m)+' · '+ (m.localHour||'')+' (heure du stade)'):''} ${m.status==='live'?' · 🔴 en cours':m.status==='played'?' · terminé':' · à venir'}</div>
    </div>
    <div class="m-body">
      ${body}
      <div class="m-info">
        <div class="m-ib"><div class="l">Phase</div><div class="v">${m.isKo?comp:'Groupe '+m.group}</div></div>
        <div class="m-ib"><div class="l">Statut</div><div class="v">${m.status==='live'?'🔴 En cours':m.status==='played'?'✓ Terminé':'⏳ À venir'}</div></div>
      </div>
    </div>`;
  $('ov').classList.add('open'); document.body.style.overflow='hidden';
}
function closeModal(){ $('ov').classList.remove('open'); document.body.style.overflow=''; }
$('ovBg').addEventListener('click',closeModal);
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

/* ---------- TABS / FILTERS ---------- */
$('hero');
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  t.classList.add('active'); curTab=t.dataset.tab;
  $('view-matchs').hidden=curTab!=='matchs';
  $('view-classement').hidden=curTab!=='classement';
  $('view-elim').hidden=curTab!=='elim';
  $('filters').style.display=curTab==='matchs'?'flex':'none';
}));
document.querySelectorAll('.filter').forEach(f=>f.addEventListener('click',()=>{
  document.querySelectorAll('.filter').forEach(x=>x.classList.remove('active'));
  f.classList.add('active'); curFilter=f.dataset.f; renderMatchs();
}));

/* ---------- SCROLL BAR ---------- */
window.addEventListener('scroll',()=>{
  const p=window.scrollY/(document.documentElement.scrollHeight-window.innerHeight)||0;
  $('scrollLine').style.width=(p*100)+'%';
},{passive:true});

/* ---------- INIT + AUTO REFRESH (live) ---------- */
load();
setInterval(load, 60000); // rafraîchit les scores toutes les 60s
</script>
